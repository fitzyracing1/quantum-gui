<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum GUI Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚛️ Quantum Computing Simulator</h1>
            <p class="subtitle">Visual Circuit Builder & ENOS Calculator</p>
        </header>

        <div class="main-content">
            <!-- ENOS Equation Calculator -->
            <section class="enos-section">
                <h2>ENOS Energy Calculator</h2>
                <div class="equation-display">
                    <p class="equation">E = mc × 1 × 2 × 3 × 4 × 1</p>
                    <p class="equation-simplified">E = 24mc</p>
                </div>
                <div class="calculator">
                    <div class="input-group">
                        <label for="mass">Mass (m):</label>
                        <input type="number" id="mass" value="1" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="speed">Speed of Light (c):</label>
                        <input type="number" id="speed" value="299792458" readonly>
                        <span class="unit">m/s</span>
                    </div>
                    <button id="calculateBtn" class="btn-primary">Calculate Energy</button>
                    <div id="result" class="result-display"></div>
                </div>
            </section>

            <!-- Quantum Circuit Builder -->
            <section class="circuit-section">
                <h2>Quantum Circuit Builder</h2>
                <div class="controls">
                    <button class="gate-btn" data-gate="H">Hadamard (H)</button>
                    <button class="gate-btn" data-gate="X">Pauli-X</button>
                    <button class="gate-btn" data-gate="Y">Pauli-Y</button>
                    <button class="gate-btn" data-gate="Z">Pauli-Z</button>
                    <button class="gate-btn" data-gate="CNOT">CNOT</button>
                    <button class="gate-btn" data-gate="M">Measure</button>
                    <button id="clearCircuit" class="btn-danger">Clear</button>
                    <button id="runCircuit" class="btn-success">Run Circuit</button>
                </div>
                <div class="circuit-display">
                    <canvas id="circuitCanvas"></canvas>
                </div>
                <div class="qubit-controls">
                    <label>Qubits:</label>
                    <input type="number" id="qubitCount" min="1" max="5" value="2">
                    <button id="updateQubits" class="btn-secondary">Update</button>
                </div>
            </section>

            <!-- Quantum State Visualizer -->
            <section class="state-section">
                <h2>Quantum State</h2>
                <div id="stateDisplay" class="state-display">
                    <div class="state-vector">
                        <p>Initial State: |00⟩</p>
                    </div>
                </div>
                <div class="probability-bars" id="probabilityBars"></div>
            </section>

            <!-- Measurement Results -->
            <section class="results-section">
                <h2>Measurement Results</h2>
                <canvas id="histogramCanvas"></canvas>
                <div id="measurements" class="measurements-display"></div>
            </section>
        </div>
    </div>

    <script src="quantum.js"></script>
    <script src="circuit.js"></script>
    <script src="app.js"></script>
</body>
</html>
